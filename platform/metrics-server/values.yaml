replicas: 2

apiService:
  create: true

args:
  - --cert-dir=/tmp
  - --secure-port=10250
  - --kubelet-insecure-tls
  - --kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP
  - --kubelet-use-node-status-port
  - --metric-resolution=15s

resources:
  requests:
    cpu: 100m
    memory: 200Mi

  limits:
    cpu: 200m
    memory: 300Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true

priorityClassName: system-cluster-critical