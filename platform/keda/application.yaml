apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
spec:
  project: default

  destination:
    server: "{{server}}"
    namespace: keda

  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.18.0

    helm:
      valueFiles:
        - values.yaml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true