grafana:
  enabled: true
  replicas: 1

  adminPassword: admin123

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx

    annotations:
      external-dns.alpha.kubernetes.io/hostname: grafana.home.local

    hosts:
      - grafana.home.local

    path: /

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi

prometheus:
  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx

    annotations:
      external-dns.alpha.kubernetes.io/hostname: prometheus.home.local

    hosts:
      - prometheus.home.local

    paths:
      - /

  prometheusSpec:
    replicas: 1
    retention: 15d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 30Gi

alertmanager:
  enabled: true

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx

    annotations:
      external-dns.alpha.kubernetes.io/hostname: alertmanager.home.local

    hosts:
      - alertmanager.home.local

    paths:
      - /

  alertmanagerSpec:
    replicas: 1

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi              